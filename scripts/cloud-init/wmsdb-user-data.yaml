#cloud-config
# ==============================================================================
# NTL-SysToolbox — Cloud-init WMS-DB (Ubuntu 20.04)
# ==============================================================================
# This file is used by Proxmox cloud-init to configure WMS-DB automatically.
# It installs MySQL, configures SSH, creates the wms database and demo data.
# ==============================================================================

hostname: wms-db
fqdn: wms-db.ntl.local
manage_etc_hosts: true

# Create the sysadmin user
users:
  - name: sysadmin
    plain_text_passwd: "SysAdm2026!"
    lock_passwd: false
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo

# Enable password authentication for SSH
ssh_pwauth: true

# Install required packages
package_update: true
package_upgrade: false
packages:
  - mysql-server
  - openssh-server
  - mysql-client
  - net-tools
  - curl

# Run post-install commands
runcmd:
  # Configure MySQL to listen on all interfaces
  - sed -i 's/^bind-address.*/bind-address = 0.0.0.0/' /etc/mysql/mysql.conf.d/mysqld.cnf
  - systemctl restart mysql

  # Create database, tables, user, and seed data
  - |
    mysql -u root <<'SQLEOF'
    CREATE DATABASE IF NOT EXISTS wms;
    USE wms;

    CREATE TABLE IF NOT EXISTS shipments (
        id INT AUTO_INCREMENT PRIMARY KEY,
        tracking_number VARCHAR(50) NOT NULL,
        origin VARCHAR(100) NOT NULL,
        destination VARCHAR(100) NOT NULL,
        status ENUM('pending', 'in_transit', 'delivered') NOT NULL DEFAULT 'pending',
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS inventory (
        id INT AUTO_INCREMENT PRIMARY KEY,
        product_code VARCHAR(30) NOT NULL,
        warehouse VARCHAR(10) NOT NULL,
        quantity INT NOT NULL DEFAULT 0,
        last_updated TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    );

    INSERT INTO shipments (tracking_number, origin, destination, status) VALUES
    ('NTL-2026-001', 'WH1-Lens', 'Client-Paris', 'delivered'),
    ('NTL-2026-002', 'WH2-Valenciennes', 'Client-Lyon', 'in_transit'),
    ('NTL-2026-003', 'WH3-Arras', 'Client-Marseille', 'pending'),
    ('NTL-2026-004', 'WH1-Lens', 'Client-Lille', 'delivered'),
    ('NTL-2026-005', 'WH2-Valenciennes', 'Client-Bordeaux', 'in_transit'),
    ('NTL-2026-006', 'WH3-Arras', 'Client-Strasbourg', 'pending'),
    ('NTL-2026-007', 'WH1-Lens', 'Client-Nantes', 'delivered'),
    ('NTL-2026-008', 'WH2-Valenciennes', 'Client-Toulouse', 'in_transit');

    INSERT INTO inventory (product_code, warehouse, quantity) VALUES
    ('SKU-A100', 'WH1', 250),
    ('SKU-B200', 'WH2', 180),
    ('SKU-C300', 'WH3', 420),
    ('SKU-D400', 'WH1', 95),
    ('SKU-E500', 'WH2', 310),
    ('SKU-F600', 'WH3', 150);

    CREATE USER IF NOT EXISTS 'wms_user'@'%' IDENTIFIED BY 'WmsP@ss2026';
    GRANT ALL PRIVILEGES ON wms.* TO 'wms_user'@'%';
    FLUSH PRIVILEGES;
    SQLEOF

  # Ensure services start on boot
  - systemctl enable mysql
  - systemctl enable ssh

  # Signal that setup is complete
  - echo "WMS-DB setup complete" > /var/log/ntl-setup.log

final_message: "WMS-DB cloud-init setup complete after $UPTIME seconds"
