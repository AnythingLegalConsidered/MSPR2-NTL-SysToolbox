#cloud-config
# ==============================================================================
# NTL-SysToolbox — Cloud-init SRV-LEGACY (Ubuntu 18.04)
# ==============================================================================
# Minimal setup. This VM only needs to exist and be pingable/scannable by nmap.
# It represents an end-of-life server for the audit module to detect.
# ==============================================================================

hostname: srv-legacy
fqdn: srv-legacy.ntl.local
manage_etc_hosts: true

users:
  - name: sysadmin
    plain_text_passwd: "SysAdm2026!"
    lock_passwd: false
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL

ssh_pwauth: true

package_update: false
packages:
  - openssh-server
  - net-tools

runcmd:
  - systemctl enable ssh

final_message: "SRV-LEGACY cloud-init complete after $UPTIME seconds"
